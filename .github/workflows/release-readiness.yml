name: release-readiness

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pack:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm release:pack
      - run: pnpm release:audit
      - name: Verify reproducible tarball digests
        run: |
          cp .release-artifacts/pack-manifest.json /tmp/pack-manifest-first.json
          pnpm release:pack
          diff -u /tmp/pack-manifest-first.json .release-artifacts/pack-manifest.json
      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: npm-tarballs
          path: .release-artifacts/
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 7

  install-smoke:
    needs: pack
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-15]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 24
          package-manager-cache: false
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: npm-tarballs
          path: .release-artifacts
      - run: node scripts/release/smoke-packed.mjs --artifacts .release-artifacts --out smoke-${{ runner.os }}.json
      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: release-smoke-${{ runner.os }}
          path: smoke-${{ runner.os }}.json
          if-no-files-found: error
          retention-days: 7

  evidence:
    needs: [pack, install-smoke]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @scopelock/core build
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: npm-tarballs
          path: .release-artifacts
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          pattern: release-smoke-*
          path: .release-smoke
          merge-multiple: true
      - run: node scripts/release/generate-evidence.mjs --artifacts .release-artifacts --smoke-dir .release-smoke --dependency-audit passed
      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: release-evidence
          path: .release-artifacts/release-evidence.json
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 30
