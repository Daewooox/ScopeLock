name: codeql

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  actions: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: github/codeql-action/init@1ad29ea4a422cce9a242a9fae469541dcd08addc # v4
        with:
          languages: javascript-typescript
      # SARIF upload to the code-scanning API requires GitHub Advanced
      # Security, which isn't available on this private repo. Run the
      # analysis and keep the SARIF as a downloadable artifact instead of
      # uploading it; revisit `upload: true` if the repo goes public or
      # GHAS becomes available.
      - uses: github/codeql-action/analyze@1ad29ea4a422cce9a242a9fae469541dcd08addc # v4
        with:
          upload: false
          output: sarif-results
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: codeql-sarif
          path: sarif-results
          retention-days: 14
