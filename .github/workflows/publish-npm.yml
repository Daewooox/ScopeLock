name: stage npm beta

on:
  workflow_dispatch:
    inputs:
      version:
        description: Exact beta version already present in all package manifests
        required: true
        type: string
      confirm:
        description: Type stage-<version> to unlock the protected staging job
        required: true
        type: string

permissions:
  contents: read

jobs:
  preflight:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      checks: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          package-manager-cache: false
      - run: npm install --global npm@11.17.0
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm audit --prod --audit-level high
      - name: Verify completed security checks on this commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          checks="$(gh api "repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/check-runs" --paginate --jq '.check_runs[] | [.name, .conclusion] | @tsv')"
          printf '%s\n' "$checks"
          printf '%s\n' "$checks" | grep -Eq '^analyze[[:space:]]+success$'
          printf '%s\n' "$checks" | grep -Eq '^gitleaks[[:space:]]+success$'
      - run: pnpm release:pack
      - run: node scripts/release/smoke-packed.mjs --artifacts .release-artifacts --out .release-smoke/smoke-Linux.json
      - run: node scripts/release/generate-evidence.mjs --artifacts .release-artifacts --smoke-dir .release-smoke --codeql passed --gitleaks passed --dependency-audit passed
      - name: Verify requested version
        env:
          EXPECTED_VERSION: ${{ inputs.version }}
        run: node -e "const m=require('./.release-artifacts/pack-manifest.json');if(m.version!==process.env.EXPECTED_VERSION)throw new Error('requested version does not match packed version')"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: npm-stage-candidate
          path: .release-artifacts/
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 7

  stage:
    needs: preflight
    if: vars.NPM_PUBLISH_ENABLED == 'true' && inputs.confirm == format('stage-{0}', inputs.version)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: npm-production
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - run: npm install --global npm@11.17.0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: npm-stage-candidate
          path: .release-artifacts
      - name: Stage packages through npm Trusted Publishing
        run: |
          npm stage publish .release-artifacts/scopelock-core-${{ inputs.version }}.tgz --access public --tag beta
          npm stage publish .release-artifacts/scopelock-cli-${{ inputs.version }}.tgz --access public --tag beta
          npm stage publish .release-artifacts/scopelock-mcp-${{ inputs.version }}.tgz --access public --tag beta
