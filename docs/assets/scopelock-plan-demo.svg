<svg xmlns="http://www.w3.org/2000/svg" width="960" height="350" viewBox="0 0 960 350" role="img" aria-labelledby="title desc">
  <title id="title">ScopeLock Standard multi-agent plan demo</title>
  <desc id="desc">An animated terminal replay that prepares a two-task plan, finds a read-write dependency, orders two safe execution stages, and writes a ready plan without starting an agent.</desc>
  <style>
    .ui{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;letter-spacing:0}.mono{font-family:SFMono-Regular,Consolas,"Liberation Mono",monospace;letter-spacing:0}
    .text{fill:#e6edf3}.muted{fill:#8b949e}.blue{fill:#79c0ff}.green{fill:#7ee787}.amber{fill:#e3b341}.spinner{fill:none;stroke:#79c0ff;stroke-width:3;stroke-linecap:round;stroke-dasharray:16 10}
    .frame{opacity:0}.f1{animation:f1 10s infinite}.f2{animation:f2 10s infinite}.f3{animation:f3 10s infinite}.f4{animation:f4 10s infinite}
    @keyframes f1{0%,20%{opacity:1}22%,100%{opacity:0}}@keyframes f2{0%,20%{opacity:0}22%,43%{opacity:1}45%,100%{opacity:0}}@keyframes f3{0%,43%{opacity:0}45%,67%{opacity:1}69%,100%{opacity:0}}@keyframes f4{0%,67%{opacity:0}69%,97%{opacity:1}100%{opacity:0}}
    @media (prefers-reduced-motion:reduce){.frame{display:none;animation:none}.frame.last{display:inline;opacity:1}}
  </style>
  <defs>
    <g id="chrome"><rect width="960" height="350" rx="12" fill="#0d1117"/><rect width="960" height="48" rx="12" fill="#161b22"/><circle cx="24" cy="24" r="6" fill="#ff5f56"/><circle cx="46" cy="24" r="6" fill="#ffbd2e"/><circle cx="68" cy="24" r="6" fill="#27c93f"/><text class="ui text" x="92" y="30" font-size="15" font-weight="700">Standard: prepare multiple agents</text><text class="ui muted" x="764" y="30" font-size="12">review before execution</text><text class="mono blue" x="32" y="82" font-size="14">$ scopelock plan prepare plan.json --target codex --out ready-plan.json</text><text class="ui muted" x="32" y="341" font-size="12">Next after review: scopelock run ready-plan.json --yes --isolate</text></g>
    <g id="hazard"><rect x="32" y="98" width="896" height="54" rx="7" fill="#2a2112" stroke="#9e6a03"/><text class="ui amber" x="50" y="122" font-size="13" font-weight="700">Read-write dependency found</text><text class="mono muted" x="50" y="142" font-size="12">config-writer must finish before summary-reader reads src/config.json</text></g>
    <g id="stages"><text class="ui muted" x="32" y="184" font-size="12" font-weight="700">SAFE EXECUTION STAGES</text><rect x="32" y="198" width="336" height="58" rx="7" fill="#0f2d1d" stroke="#238636"/><text class="ui green" x="50" y="221" font-size="11" font-weight="700">STAGE 1</text><text class="mono text" x="50" y="244" font-size="13">config-writer</text><path d="M390 227h84" stroke="#8b949e" stroke-width="2"/><path d="m466 220 10 7-10 7" fill="none" stroke="#8b949e" stroke-width="2"/><rect x="498" y="198" width="430" height="58" rx="7" fill="#0f2d1d" stroke="#238636"/><text class="ui green" x="516" y="221" font-size="11" font-weight="700">STAGE 2</text><text class="mono text" x="516" y="244" font-size="13">summary-reader</text></g>
  </defs>

  <g class="frame f1"><use href="#chrome"/><circle class="spinner" cx="42" cy="110" r="9"><animateTransform attributeName="transform" type="rotate" from="0 42 110" to="360 42 110" dur=".8s" repeatCount="indefinite"/></circle><text class="ui muted" x="62" y="115" font-size="13">Checking contracts, hazards, harness, and workspace...</text></g>

  <g class="frame f2"><use href="#chrome"/><use href="#hazard"/></g>

  <g class="frame f3"><use href="#chrome"/><use href="#hazard"/><use href="#stages"/></g>

  <g class="frame f4 last"><use href="#chrome"/><use href="#hazard"/><use href="#stages"/><rect x="32" y="280" width="896" height="42" rx="7" fill="#11161d" stroke="#30363d"/><circle cx="50" cy="301" r="10" fill="#238636"/><path d="m45 301 3 3 7-8" fill="none" stroke="#fff" stroke-width="2.2"/><text class="ui green" x="70" y="306" font-size="14" font-weight="700">ready-plan.json written</text><text class="ui muted" x="279" y="306" font-size="12">review the argv and stages before run</text><text class="ui amber" x="809" y="306" font-size="12">agent run: no</text></g>
</svg>
