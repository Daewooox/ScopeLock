<svg xmlns="http://www.w3.org/2000/svg" width="960" height="694" viewBox="0 0 960 694" role="img" aria-labelledby="title desc">
  <title id="title">ScopeLock Standard multi-agent plan demo</title>
  <desc id="desc">A real, regenerated terminal replay preparing a conflict-aware two-stage plan.</desc>
  <style>
    .ui{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    .mono{font-family:SFMono-Regular,Consolas,"Liberation Mono",monospace}
    .text{fill:#e6edf3}.muted{fill:#8b949e}.blue{fill:#79c0ff}
    .animated{opacity:0;animation-duration:8s;animation-timing-function:steps(1,end);animation-iteration-count:infinite}
    .pending0{animation-name:pending0}.after0{animation-name:after0}
    @keyframes pending0{0%,0.000%{opacity:0}0.001%,50.000%{opacity:1}50.001%,100%{opacity:0}}@keyframes after0{0%,49.999%{opacity:0}50.000%,100%{opacity:1}}
    @media (prefers-reduced-motion:reduce){.animated{animation:none;opacity:0}.final{opacity:1}}
  </style>
  <rect width="960" height="694" rx="12" fill="#0d1117"/>
  <rect width="960" height="48" rx="12" fill="#161b22"/>
  <circle cx="24" cy="24" r="6" fill="#ff5f56"/><circle cx="46" cy="24" r="6" fill="#ffbd2e"/><circle cx="68" cy="24" r="6" fill="#27c93f"/>
  <text class="ui text" x="92" y="30" font-size="15" font-weight="700">ScopeLock Standard multi-agent plan demo</text>
  <text class="mono blue" x="32" y="82" font-size="14">$ scopelock plan prepare plan.json --target codex --out ready.json</text>
  <g class="animated pending0"><text class="ui muted" x="32" y="116" font-size="13">scheduling -&gt; preflight -&gt; composing...</text></g>
  <g class="animated after0 final"><text class="mono" x="32" y="136" font-size="13" xml:space="preserve"><tspan fill="#79c0ff">Context</tspan></text><text class="mono" x="32" y="156" font-size="13" xml:space="preserve"><tspan fill="#e6edf3">  Plan    demo-standard</tspan></text><text class="mono" x="32" y="176" font-size="13" xml:space="preserve"><tspan fill="#e6edf3">  Target  codex</tspan></text><text class="mono" x="32" y="196" font-size="13" xml:space="preserve"></text><text class="mono" x="32" y="216" font-size="13" xml:space="preserve"><tspan fill="#79c0ff">Execution stages</tspan></text><text class="mono" x="32" y="236" font-size="13" xml:space="preserve"><tspan fill="#e6edf3">  stage 1: [writer]</tspan></text><text class="mono" x="32" y="256" font-size="13" xml:space="preserve"><tspan fill="#e6edf3">  stage 2: [reader]</tspan></text><text class="mono" x="32" y="276" font-size="13" xml:space="preserve"></text><text class="mono" x="32" y="296" font-size="13" xml:space="preserve"><tspan fill="#79c0ff">Checks</tspan></text><text class="mono" x="32" y="316" font-size="13" xml:space="preserve"><tspan fill="#e6edf3">  </tspan><tspan fill="#8b949e">Check</tspan><tspan fill="#e6edf3">                                   </tspan><tspan fill="#8b949e">Status</tspan><tspan fill="#e6edf3">  </tspan><tspan fill="#8b949e">Detail</tspan><tspan fill="#e6edf3">                                                                    </tspan></text><text class="mono" x="32" y="336" font-size="13" xml:space="preserve"><tspan fill="#e6edf3">  Scope overlaps                          </tspan><tspan fill="#e3b341">WARN</tspan><tspan fill="#e6edf3">    1 ordered safely                                                          </tspan></text><text class="mono" x="32" y="356" font-size="13" xml:space="preserve"><tspan fill="#e6edf3">  </tspan><tspan fill="#8b949e">    ↳ overlapping scope was reordered into separate stages</tspan></text><text class="mono" x="32" y="376" font-size="13" xml:space="preserve"><tspan fill="#e6edf3">  </tspan><tspan fill="#8b949e">Codex CLI CLI</tspan><tspan fill="#e6edf3">                           </tspan><tspan fill="#7ee787">PASS</tspan><tspan fill="#e6edf3">    </tspan><tspan fill="#8b949e">found</tspan><tspan fill="#e6edf3">                                                                     </tspan></text><text class="mono" x="32" y="396" font-size="13" xml:space="preserve"><tspan fill="#e6edf3">  Hook confidence                         </tspan><tspan fill="#e3b341">WARN</tspan><tspan fill="#e6edf3">    degraded                                                                  </tspan></text><text class="mono" x="32" y="416" font-size="13" xml:space="preserve"><tspan fill="#e6edf3">  </tspan><tspan fill="#8b949e">    ↳ project trust could not be verified statically</tspan></text><text class="mono" x="32" y="436" font-size="13" xml:space="preserve"><tspan fill="#e6edf3">  Rules and skills                        </tspan><tspan fill="#e3b341">WARN</tspan><tspan fill="#e6edf3">    not configured                                                            </tspan></text><text class="mono" x="32" y="456" font-size="13" xml:space="preserve"><tspan fill="#e6edf3">  </tspan><tspan fill="#8b949e">    ↳ no manifest supplied</tspan></text><text class="mono" x="32" y="476" font-size="13" xml:space="preserve"><tspan fill="#e6edf3">  </tspan><tspan fill="#8b949e">Agent commands</tspan><tspan fill="#e6edf3">                          </tspan><tspan fill="#7ee787">PASS</tspan><tspan fill="#e6edf3">    </tspan><tspan fill="#8b949e">2 composed</tspan><tspan fill="#e6edf3">                                                                </tspan></text><text class="mono" x="32" y="496" font-size="13" xml:space="preserve"><tspan fill="#e6edf3">  </tspan><tspan fill="#8b949e">Validation check repository-validation</tspan><tspan fill="#e6edf3">  </tspan><tspan fill="#7ee787">PASS</tspan><tspan fill="#e6edf3">    </tspan><tspan fill="#8b949e">required=true /opt/homebrew/Cellar/node/26.5.0/bin/node -e process.exit(0)</tspan></text><text class="mono" x="32" y="516" font-size="13" xml:space="preserve"></text><text class="mono" x="32" y="536" font-size="13" xml:space="preserve"><tspan fill="#79c0ff">Result</tspan></text><text class="mono" x="32" y="556" font-size="13" xml:space="preserve"><tspan fill="#e6edf3">  Ready plan written  /private./ready.json</tspan></text><text class="mono" x="32" y="576" font-size="13" xml:space="preserve"><tspan fill="#e6edf3">  No agent was started</tspan></text><text class="mono" x="32" y="596" font-size="13" xml:space="preserve"></text><text class="mono" x="32" y="616" font-size="13" xml:space="preserve"><tspan fill="#79c0ff">Next</tspan></text><text class="mono" x="32" y="636" font-size="13" xml:space="preserve"><tspan fill="#e6edf3">  Review the file, then run: scopelock run &quot;/private./ready.json&quot; --yes --isolate</tspan></text></g>
</svg>