<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="620" viewBox="0 0 1080 620" role="img" aria-labelledby="title desc">
  <title id="title">ScopeLock progressive CLI demo</title>
  <desc id="desc">The Guided flow checks a repository, approves a task boundary, and creates a Flight Report. The Standard flow detects a read-write dependency and writes a two-stage ready plan without starting an agent.</desc>
  <style>
    .ui{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;letter-spacing:0}
    .mono{font-family:SFMono-Regular,Consolas,"Liberation Mono",monospace;letter-spacing:0}
    .muted{fill:#8b949e}.text{fill:#e6edf3}.blue{fill:#79c0ff}.green{fill:#7ee787}.amber{fill:#e3b341}
  </style>

  <rect width="1080" height="620" rx="12" fill="#0d1117"/>
  <rect width="1080" height="52" rx="12" fill="#161b22"/>
  <circle cx="26" cy="26" r="6" fill="#ff5f56"/>
  <circle cx="48" cy="26" r="6" fill="#ffbd2e"/>
  <circle cx="70" cy="26" r="6" fill="#27c93f"/>
  <text class="ui text" x="94" y="32" font-size="16" font-weight="700">ScopeLock progressive demo</text>
  <text class="ui muted" x="846" y="32" font-size="13">local / deterministic</text>

  <rect x="30" y="76" width="496" height="350" rx="8" fill="#11161d" stroke="#30363d"/>
  <text class="ui text" x="54" y="106" font-size="16" font-weight="700">Guided: one protected task</text>
  <text class="ui muted" x="54" y="128" font-size="12">Three commands, normal ScopeLock artifacts</text>

  <text class="mono blue" x="54" y="164" font-size="13">$ scopelock setup</text>
  <rect x="54" y="178" width="448" height="42" rx="6" fill="#0f2d1d" stroke="#238636"/>
  <text class="ui green" x="70" y="204" font-size="13" font-weight="700">OK</text>
  <text class="ui text" x="104" y="204" font-size="13">Repository and agent environment checked</text>

  <text class="mono blue" x="54" y="250" font-size="13">$ scopelock task start "Update greeting"</text>
  <rect x="54" y="264" width="448" height="70" rx="6" fill="#161b22" stroke="#30363d"/>
  <text class="ui green" x="70" y="289" font-size="13" font-weight="700">Boundary approved</text>
  <text class="mono muted" x="70" y="310" font-size="12">may change  src/greeting.js, tests/greeting.test.js</text>
  <text class="mono amber" x="70" y="327" font-size="12">agent started  no</text>

  <text class="mono blue" x="54" y="364" font-size="13">$ scopelock task finish</text>
  <rect x="54" y="378" width="448" height="32" rx="6" fill="#0f2d1d" stroke="#238636"/>
  <text class="ui green" x="70" y="399" font-size="13" font-weight="700">Cleared</text>
  <text class="ui text" x="136" y="399" font-size="12">Flight Report saved</text>
  <text class="ui amber" x="339" y="399" font-size="12">tests run: no</text>

  <rect x="550" y="76" width="500" height="350" rx="8" fill="#11161d" stroke="#30363d"/>
  <text class="ui text" x="574" y="106" font-size="16" font-weight="700">Standard: prepare multiple agents</text>
  <text class="ui muted" x="574" y="128" font-size="12">Compile first, review before execution</text>

  <text class="mono blue" x="574" y="164" font-size="13">$ scopelock plan prepare plan.json</text>
  <text class="mono blue" x="594" y="184" font-size="13">--target codex --out ready-plan.json</text>

  <rect x="574" y="204" width="452" height="54" rx="6" fill="#2a2112" stroke="#9e6a03"/>
  <text class="ui amber" x="592" y="226" font-size="13" font-weight="700">Read-write dependency</text>
  <text class="mono muted" x="592" y="246" font-size="12">config-writer before summary-reader</text>

  <text class="ui muted" x="574" y="290" font-size="12" font-weight="700">EXECUTION STAGES</text>
  <rect x="574" y="306" width="174" height="54" rx="6" fill="#0f2d1d" stroke="#238636"/>
  <text class="ui green" x="592" y="328" font-size="11" font-weight="700">STAGE 1</text>
  <text class="mono text" x="592" y="349" font-size="12">config-writer</text>
  <path d="M760 333h42" stroke="#8b949e" stroke-width="2"/>
  <path d="m796 327 8 6-8 6" fill="none" stroke="#8b949e" stroke-width="2"/>
  <rect x="816" y="306" width="210" height="54" rx="6" fill="#0f2d1d" stroke="#238636"/>
  <text class="ui green" x="834" y="328" font-size="11" font-weight="700">STAGE 2</text>
  <text class="mono text" x="834" y="349" font-size="12">summary-reader</text>

  <rect x="574" y="378" width="452" height="32" rx="6" fill="#161b22" stroke="#30363d"/>
  <text class="ui green" x="592" y="399" font-size="13" font-weight="700">ready-plan.json written</text>
  <text class="ui amber" x="861" y="399" font-size="12">agent run: no</text>

  <rect x="30" y="450" width="1020" height="84" rx="8" fill="#161b22" stroke="#30363d"/>
  <text class="ui text" x="54" y="478" font-size="13" font-weight="700">Reviewable artifacts</text>
  <text class="mono green" x="54" y="505" font-size="12">guided-drift.json</text>
  <text class="mono blue" x="218" y="505" font-size="12">guided-report.html</text>
  <text class="mono text" x="392" y="505" font-size="12">plan.json</text>
  <text class="mono amber" x="482" y="505" font-size="12">ready-plan.json</text>
  <text class="ui muted" x="766" y="505" font-size="12">no model or agent executed</text>

  <line x1="30" y1="562" x2="1050" y2="562" stroke="#30363d"/>
  <text class="mono blue" x="30" y="590" font-size="13">$ scopelock run ready-plan.json --yes --isolate</text>
  <text class="ui muted" x="753" y="590" font-size="12">explicit next step after review</text>
</svg>
