<svg xmlns="http://www.w3.org/2000/svg" width="960" height="1082" viewBox="0 0 960 1082" role="img" aria-labelledby="title desc">
  <title id="title">ScopeLock Guided terminal demo</title>
  <desc id="desc">A real, regenerated terminal replay of task start and task finish.</desc>
  <style>
    .ui{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    .mono{font-family:SFMono-Regular,Consolas,"Liberation Mono",monospace}
    .text{fill:#e6edf3}.muted{fill:#8b949e}.blue{fill:#79c0ff}
    .animated{opacity:0;animation-duration:8s;animation-timing-function:steps(1,end);animation-iteration-count:infinite}
    .pending0{animation-name:pending0}.after0{animation-name:after0}.pending1{animation-name:pending1}.after1{animation-name:after1}
    @keyframes pending0{0%,0.000%{opacity:0}0.001%,25.000%{opacity:1}25.001%,100%{opacity:0}}@keyframes after0{0%,24.999%{opacity:0}25.000%,100%{opacity:1}}@keyframes pending1{0%,50.000%{opacity:0}50.001%,75.000%{opacity:1}75.001%,100%{opacity:0}}@keyframes after1{0%,74.999%{opacity:0}75.000%,100%{opacity:1}}
    @media (prefers-reduced-motion:reduce){.animated{animation:none;opacity:0}.final{opacity:1}}
  </style>
  <rect width="960" height="1082" rx="12" fill="#0d1117"/>
  <rect width="960" height="48" rx="12" fill="#161b22"/>
  <circle cx="24" cy="24" r="6" fill="#ff5f56"/><circle cx="46" cy="24" r="6" fill="#ffbd2e"/><circle cx="68" cy="24" r="6" fill="#27c93f"/>
  <text class="ui text" x="92" y="30" font-size="15" font-weight="700">ScopeLock Guided terminal demo</text>
  <text class="mono blue" x="32" y="82" font-size="14">$ scopelock task start &quot;Add a dark mode toggle&quot; --agent codex --allow src --yes</text>
  <g class="animated pending0"><text class="ui muted" x="32" y="116" font-size="13">Describe and scope the task -&gt; Review and approve -&gt; Connect the agent...</text></g>
  <g class="animated after0 final"><text class="mono" x="32" y="136" font-size="13" xml:space="preserve"><tspan fill="#79c0ff">Review</tspan></text><text class="mono" x="32" y="156" font-size="13" xml:space="preserve"><tspan fill="#e6edf3">  Task      Add a dark mode toggle</tspan></text><text class="mono" x="32" y="176" font-size="13" xml:space="preserve"><tspan fill="#e6edf3">  Agent     Codex CLI</tspan></text><text class="mono" x="32" y="196" font-size="13" xml:space="preserve"><tspan fill="#e6edf3">  May edit  src/**</tspan></text><text class="mono" x="32" y="216" font-size="13" xml:space="preserve"><tspan fill="#e6edf3">  Blocked   none</tspan></text><text class="mono" x="32" y="236" font-size="13" xml:space="preserve"><tspan fill="#e6edf3">  Context   none</tspan></text><text class="mono" x="32" y="256" font-size="13" xml:space="preserve"><tspan fill="#e6edf3">  Tests     unit</tspan></text><text class="mono" x="32" y="276" font-size="13" xml:space="preserve"><tspan fill="#e6edf3">  Coverage  0/2 tracked files; future matching files are included</tspan></text><text class="mono" x="32" y="296" font-size="13" xml:space="preserve"><tspan fill="#e6edf3">  Draft     ./.scopelock/drafts/demo-guided.json</tspan></text><text class="mono" x="32" y="316" font-size="13" xml:space="preserve"></text><text class="mono" x="32" y="336" font-size="13" xml:space="preserve"><tspan fill="#79c0ff">Checks</tspan></text><text class="mono" x="32" y="356" font-size="13" xml:space="preserve"><tspan fill="#e6edf3">  Approved  yes, active baseline captured</tspan></text><text class="mono" x="32" y="376" font-size="13" xml:space="preserve"><tspan fill="#e6edf3">  Environment  Ready with drift detection; no active write hook</tspan></text><text class="mono" x="32" y="396" font-size="13" xml:space="preserve"><tspan fill="#e6edf3">  Instructions  not changed</tspan></text><text class="mono" x="32" y="416" font-size="13" xml:space="preserve"><tspan fill="#e6edf3">  Agent started  no</tspan></text><text class="mono" x="32" y="436" font-size="13" xml:space="preserve"><tspan fill="#e6edf3">  Tests executed no</tspan></text><text class="mono" x="32" y="456" font-size="13" xml:space="preserve"><tspan fill="#e6edf3">  OS sandbox     no</tspan></text><text class="mono" x="32" y="476" font-size="13" xml:space="preserve"></text><text class="mono" x="32" y="496" font-size="13" xml:space="preserve"><tspan fill="#79c0ff">Result</tspan></text><text class="mono" x="32" y="516" font-size="13" xml:space="preserve"><tspan fill="#e6edf3">  Task boundary is ready</tspan></text><text class="mono" x="32" y="536" font-size="13" xml:space="preserve"></text><text class="mono" x="32" y="556" font-size="13" xml:space="preserve"><tspan fill="#79c0ff">Next</tspan></text><text class="mono" x="32" y="576" font-size="13" xml:space="preserve"><tspan fill="#e6edf3">  Let the agent work, then run: scopelock task finish</tspan></text></g>
  <text class="mono blue" x="32" y="596" font-size="14">$ scopelock task finish</text>
  <g class="animated pending1"><text class="ui muted" x="32" y="630" font-size="13">checking-drift -&gt; rendering-report...</text></g>
  <g class="animated after1 final"><text class="mono" x="32" y="650" font-size="13" xml:space="preserve"><tspan fill="#79c0ff">Context</tspan></text><text class="mono" x="32" y="670" font-size="13" xml:space="preserve"><tspan fill="#e6edf3">  Task boundary  demo-guided</tspan></text><text class="mono" x="32" y="690" font-size="13" xml:space="preserve"></text><text class="mono" x="32" y="710" font-size="13" xml:space="preserve"><tspan fill="#79c0ff">Checks</tspan></text><text class="mono" x="32" y="730" font-size="13" xml:space="preserve"><tspan fill="#e6edf3">  </tspan><tspan fill="#8b949e">Finding</tspan><tspan fill="#e6edf3">          </tspan><tspan fill="#8b949e">Status</tspan><tspan fill="#e6edf3">  </tspan><tspan fill="#8b949e">Count</tspan><tspan fill="#e6edf3">  </tspan><tspan fill="#8b949e">Paths</tspan><tspan fill="#e6edf3">                                  </tspan></text><text class="mono" x="32" y="750" font-size="13" xml:space="preserve"><tspan fill="#8b949e">Allowed changes</tspan><tspan fill="#e6edf3">  </tspan><tspan fill="#7ee787">PASS</tspan><tspan fill="#e6edf3">    </tspan><tspan fill="#8b949e">2</tspan><tspan fill="#e6edf3">      </tspan><tspan fill="#8b949e">src/dark-mode.js, src/dark-mode.test.js</tspan></text><text class="mono" x="32" y="770" font-size="13" xml:space="preserve"><tspan fill="#8b949e">Blocked changes</tspan><tspan fill="#e6edf3">  </tspan><tspan fill="#7ee787">PASS</tspan><tspan fill="#e6edf3">    </tspan><tspan fill="#8b949e">0</tspan><tspan fill="#e6edf3">      </tspan><tspan fill="#8b949e">none</tspan><tspan fill="#e6edf3">                                   </tspan></text><text class="mono" x="32" y="790" font-size="13" xml:space="preserve"><tspan fill="#8b949e">Outside scope</tspan><tspan fill="#e6edf3">    </tspan><tspan fill="#7ee787">PASS</tspan><tspan fill="#e6edf3">    </tspan><tspan fill="#8b949e">0</tspan><tspan fill="#e6edf3">      </tspan><tspan fill="#8b949e">none</tspan><tspan fill="#e6edf3">                                   </tspan></text><text class="mono" x="32" y="810" font-size="13" xml:space="preserve"><tspan fill="#8b949e">High risk</tspan><tspan fill="#e6edf3">        </tspan><tspan fill="#7ee787">PASS</tspan><tspan fill="#e6edf3">    </tspan><tspan fill="#8b949e">0</tspan><tspan fill="#e6edf3">      </tspan><tspan fill="#8b949e">none</tspan><tspan fill="#e6edf3">                                   </tspan></text><text class="mono" x="32" y="830" font-size="13" xml:space="preserve"><tspan fill="#e6edf3">  Tests executed  no (ScopeLock checked contract evidence only)</tspan></text><text class="mono" x="32" y="850" font-size="13" xml:space="preserve"></text><text class="mono" x="32" y="870" font-size="13" xml:space="preserve"><tspan fill="#79c0ff">Result</tspan></text><text class="mono" x="32" y="890" font-size="13" xml:space="preserve"><tspan fill="#e6edf3">  Cleared</tspan></text><text class="mono" x="32" y="910" font-size="13" xml:space="preserve"><tspan fill="#e6edf3">  Drift report  ./.scopelock/reports/drift-demo.json</tspan></text><text class="mono" x="32" y="930" font-size="13" xml:space="preserve"><tspan fill="#e6edf3">  Flight Report ./.scopelock/reports/drift-demo.html</tspan></text><text class="mono" x="32" y="950" font-size="13" xml:space="preserve"><tspan fill="#e6edf3">  Browser       not opened</tspan></text><text class="mono" x="32" y="970" font-size="13" xml:space="preserve"></text><text class="mono" x="32" y="990" font-size="13" xml:space="preserve"><tspan fill="#79c0ff">Next</tspan></text><text class="mono" x="32" y="1010" font-size="13" xml:space="preserve"><tspan fill="#e6edf3">  Review and commit the accepted changes</tspan></text></g>
</svg>